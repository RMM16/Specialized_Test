name: build-and-test

on:
  push:
  pull_request:

jobs:
  native_sim:
    runs-on: ubuntu-22.04
    container:
      # TODO: pin to a specific tag compatible with Zephyr v4.4.0
      # (confirm against zephyr/.github/workflows after the first west update,
      # or against the tag used in an already-validated local environment).
      image: zephyrprojectrtos/ci:latest
      options: --user root
    env:
      # native_sim only needs the host toolchain, not the cross-compiling
      # Zephyr SDK. Without this, CMake fails looking for a Zephyr-sdk
      # package config that the CI image does not need to provide.
      ZEPHYR_TOOLCHAIN_VARIANT: host
    steps:
      - name: Checkout manifest repo
        uses: actions/checkout@v4
        with:
          path: Specialized_Test

      - name: Cache west workspace
        uses: actions/cache@v4
        with:
          path: |
            zephyr
            modules
            bootloader
            tools
          key: west-${{ hashFiles('Specialized_Test/west.yml') }}

      - name: Initialize and update west workspace
        run: |
          west init -l Specialized_Test
          west update
          west zephyr-export

      - name: Build app for native_sim
        run: west build -p always -b native_sim Specialized_Test/app

      - name: Run unit tests
        # tests/unit does not have CMakeLists.txt/prj.conf/tests.yaml yet
        # (lands in Branch 5). Remove continue-on-error once it exists.
        continue-on-error: true
        run: west twister -T Specialized_Test/tests/unit -p unit_testing --inline-logs -v
