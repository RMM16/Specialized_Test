name: build-and-test

on:
  push:
  pull_request:

jobs:
  native_sim:
    runs-on: ubuntu-22.04
    env:
      # native_sim only needs the host toolchain, no cross-compiling
      # Zephyr SDK is required (or installed) for this job.
      ZEPHYR_TOOLCHAIN_VARIANT: host
    steps:
      - name: Checkout manifest repo
        uses: actions/checkout@v4
        with:
          path: Specialized_Test

      - name: Install native_sim build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git gcc g++ make gperf ccache dfu-util device-tree-compiler \
            wget xz-utils file libsdl2-dev \
            gcc-multilib g++-multilib libc6-dev-i386

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Python environment
        run: |
          python3 -m venv ~/.venv-zephyr
          source ~/.venv-zephyr/bin/activate
          pip install west

      - name: Cache west workspace
        uses: actions/cache@v4
        with:
          path: |
            zephyr
            modules
            bootloader
            tools
          key: west-${{ hashFiles('Specialized_Test/west.yml') }}

      - name: Initialize and update west workspace
        run: |
          source ~/.venv-zephyr/bin/activate
          west init -l Specialized_Test
          west update
          west zephyr-export
          pip install -r zephyr/scripts/requirements.txt

      - name: Build app for native_sim
        run: |
          source ~/.venv-zephyr/bin/activate
          west build -p always -b native_sim Specialized_Test/app

      - name: Run unit tests
        # tests/unit does not have CMakeLists.txt/prj.conf/tests.yaml yet
        # (lands in Branch 5). Remove continue-on-error once it exists.
        continue-on-error: true
        run: |
          source ~/.venv-zephyr/bin/activate
          west twister -T Specialized_Test/tests/unit -p unit_testing --inline-logs -v
