name: build-and-test

on:
  push:
  pull_request:

jobs:
  native_sim:
    runs-on: ubuntu-22.04
    env:
      # native_sim only needs the host toolchain; no cross-compiling Zephyr
      # SDK is installed or required for this job.
      ZEPHYR_TOOLCHAIN_VARIANT: host
    steps:
      - name: Checkout manifest repo
        uses: actions/checkout@v4
        with:
          path: Specialized_Test

      - name: Install native_sim build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git gcc g++ make gperf ccache dfu-util device-tree-compiler \
            wget xz-utils file libsdl2-dev \
            gcc-multilib g++-multilib libc6-dev-i386

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Python environment
        run: |
          python3 -m venv ~/.venv-zephyr
          source ~/.venv-zephyr/bin/activate
          # Pinned to the version already validated in docs/build.md, so
          # west itself does not silently drift between CI runs.
          pip install west==1.5.0

      - name: Cache west workspace
        uses: actions/cache@v4
        with:
          path: |
            zephyr
            modules
            bootloader
            tools
          key: west-${{ hashFiles('Specialized_Test/west.yml') }}

      - name: Initialize and update west workspace
        run: |
          source ~/.venv-zephyr/bin/activate
          west init -l Specialized_Test
          west update
          west zephyr-export
          pip install -r zephyr/scripts/requirements.txt

      - name: Build app for native_sim with default configuration
        run: |
          source ~/.venv-zephyr/bin/activate
          west build -p always -b native_sim Specialized_Test/app

      - name: Run native_sim and check boot output
        # native_sim keeps the simulated kernel running after main()
        # returns, so capture a few seconds of output instead of waiting
        # for the process to exit on its own. 3s is enough for the
        # fastest periodic TX (250ms) to fire several times.
        run: |
          timeout 3 ./build/zephyr/zephyr.exe > native_sim_output.log 2>&1 || true
          cat native_sim_output.log
          grep -q "Specialized Test booted on native_sim" native_sim_output.log
          grep -q "Build-time configuration validated" native_sim_output.log
          grep -q "CAN TX sent ID 0x100" native_sim_output.log
          grep -q "CAN TX sent ID 0x101" native_sim_output.log
          grep -q "CAN TX sent ID 0x102" native_sim_output.log
          grep -qE "ID=0x10[012] \(STD\) DLC=8 DATA=" native_sim_output.log

      - name: Build app for native_sim with an alternate configuration
        # Exercises the build-time config plan's acceptance criterion: it
        # must also build with a non-default, still-valid variant (all
        # three optional triggers enabled, using their non-colliding
        # default IDs).
        run: |
          source ~/.venv-zephyr/bin/activate
          west build -p always -b native_sim -d build-alt Specialized_Test/app -- \
            -DCONFIG_APP_START_TRIGGER_ENABLE=y \
            -DCONFIG_APP_STOP_TRIGGER_ENABLE=y \
            -DCONFIG_APP_HELLO_TRIGGER_ENABLE=y

      - name: Run native_sim alternate build and check start trigger gating
        # With the start trigger enabled, app_logic_init() leaves
        # printing_enabled false until the configured start ID (0x200 by
        # default) is observed. Nothing on this bus ever transmits 0x200
        # (the periodic TX uses 0x100/0x101/0x102, and there is no peer to
        # inject a real start frame in this CI job), so the formatted RX
        # lines for the TX loopback must never appear. This only proves the
        # "blocked before start" half of the acceptance criterion; the
        # smoke scenario below exercises the full start/hello/stop
        # lifecycle instead.
        run: |
          timeout 3 ./build-alt/zephyr/zephyr.exe > native_sim_alt_output.log 2>&1 || true
          cat native_sim_alt_output.log
          grep -q "Specialized Test booted on native_sim" native_sim_alt_output.log
          grep -q "Build-time configuration validated" native_sim_alt_output.log
          grep -q "CAN TX sent ID 0x100" native_sim_alt_output.log
          ! grep -qE "ID=0x10[012] \(STD\) DLC=8 DATA=" native_sim_alt_output.log

      - name: Build and run the native_sim smoke scenario
        # prj_smoke.conf enables all three triggers plus the one-shot
        # injector (runtime_start_smoke_injector), which sends the start,
        # hello and stop trigger IDs over the loopback bus itself -- the
        # only way to exercise the full trigger lifecycle on native_sim
        # without a second CAN bus peer. Verifies not just that the right
        # lines appear, but that every formatted RX line falls between the
        # injected start and stop markers, i.e. printing was actually
        # gated by the triggers and not just always-on or always-off.
        run: |
          source ~/.venv-zephyr/bin/activate
          west build -p always -b native_sim -d build-smoke Specialized_Test/app -- \
            -DEXTRA_CONF_FILE=prj_smoke.conf
          timeout 4 ./build-smoke/zephyr/zephyr.exe > native_sim_smoke_output.log 2>&1 || true
          cat native_sim_smoke_output.log
          grep -q "Smoke: sent start trigger ID 0x200" native_sim_smoke_output.log
          grep -q "Smoke: sent hello trigger ID 0x202" native_sim_smoke_output.log
          grep -q "Smoke: sent stop trigger ID 0x201" native_sim_smoke_output.log
          grep -q "hello specialized" native_sim_smoke_output.log
          grep -qE "ID=0x10[012] \(STD\) DLC=8 DATA=" native_sim_smoke_output.log
          awk '
            /Smoke: sent start trigger/ { start = NR }
            /Smoke: sent stop trigger/ { stop = NR }
            /ID=0x10[012] \(STD\) DLC=8 DATA=/ { rx_lines[NR] = 1 }
            END {
              if (!start || !stop) {
                print "missing start or stop marker"; exit 1
              }
              for (line in rx_lines) {
                # for (k in array) keys are plain strings, not numeric
                # strings, so "10" < 8 compares lexicographically as
                # true unless forced back to numeric with +0.
                if (line + 0 < start || line + 0 > stop) {
                  print "formatted RX line at " line " falls outside the start/stop window"
                  exit 1
                }
              }
              print "OK: every formatted RX line falls within the start/stop window"
            }
          ' native_sim_smoke_output.log

      - name: Run unit tests on unit_testing platform
        run: |
          source ~/.venv-zephyr/bin/activate
          west twister -T Specialized_Test/tests/unit -p unit_testing --inline-logs -v
