# Overlay for the native_sim smoke scenario (test/native-sim-smoke).
# Enables all three optional triggers and the one-shot trigger injector,
# so a single native_sim run demonstrates the full start/stop/hello
# lifecycle without a second CAN bus peer. Build with:
#
#   west build -p always -b native_sim app -- -DEXTRA_CONF_FILE=prj_smoke.conf
#
# Never combine this overlay with a real board.

CONFIG_APP_START_TRIGGER_ENABLE=y
CONFIG_APP_STOP_TRIGGER_ENABLE=y
CONFIG_APP_HELLO_TRIGGER_ENABLE=y
CONFIG_APP_SMOKE_TEST_INJECT_TRIGGERS=y
